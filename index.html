<!DOCTYPE html>

<body class="bg-gray-100">

<header>

                <li><a href="#" class="text-gray-300 hover:text-white">Home</a></li>

                <li><a href="#" class="text-gray-300 hover:text-white">Categories</a></li>

        </div>

    <section class="relative h-screen bg-cover bg-center" style="background-image: url('images/hero1.webp');">

                Latest Electronics at Your Fingertips
